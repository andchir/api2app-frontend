<header class="bg-white shadow-md sm:shadow">
    <div class="mx-auto max-w-7xl px-4 py-6 md:px-6 lg:px-8">
        <div class="lg:flex lg:justify-between lg:items-center">
            <div class="mb-3 lg:mb-0 text-center lg:text-left whitespace-nowrap w-auto lg:w-[220px]">
                <h1 class="text-2xl lg:text-3xl font-bold tracking-tight text-gray-900 app-font-header" i18n="@@UserDataTables">Data Tables</h1>
            </div>
            <div class="grow px-0 lg:px-4 mb-3 lg:mb-0">
                <div class="relative">
                    <div class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none">
                        <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/>
                        </svg>
                    </div>
                    <input type="search"
                           class="block w-full p-2 ps-10 text-sm text-gray-900 border border-gray-300 rounded-lg bg-gray-50 focus:ring-blue-500 focus:border-blue-500 shadow-inner"
                           [(ngModel)]="searchInput"
                           (keyup)="onSearchKeyUp($event)"
                           (search)="onSearchKeyUp($event)"
                           placeholder="Search..."
                           i18n-placeholder="@@UserDataSearchPlaceholder">
                </div>
            </div>
            <div class="text-center lg:text-left">
                <a class="inline-block rounded bg-indigo-600 px-8 py-3 text-sm font-medium text-white transition hover:scale-110 hover:shadow-xl focus:outline-none focus:ring active:bg-indigo-500"
                   routerLink="/user-data/create"
                   i18n="@@UserDataCreateTable">Create Table</a>
            </div>
        </div>
    </div>
</header>

<main>
    <div class="mx-auto max-w-7xl py-6 sm:px-6 lg:px-8">

        <div class="relative z-10" *ngIf="loading">
            <div role="status" class="absolute right-1/2 translate-x-1/2 top-3">
                <svg aria-hidden="true" class="inline-block w-8 h-8 text-gray-200 animate-spin fill-blue-600" viewBox="0 0 100 101" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M100 50.5908C100 78.2051 77.6142 100.591 50 100.591C22.3858 100.591 0 78.2051 0 50.5908C0 22.9766 22.3858 0.59082 50 0.59082C77.6142 0.59082 100 22.9766 100 50.5908ZM9.08144 50.5908C9.08144 73.1895 27.4013 91.5094 50 91.5094C72.5987 91.5094 90.9186 73.1895 90.9186 50.5908C90.9186 27.9921 72.5987 9.67226 50 9.67226C27.4013 9.67226 9.08144 27.9921 9.08144 50.5908Z" fill="currentColor"/><path d="M93.9676 39.0409C96.393 38.4038 97.8624 35.9116 97.0079 33.5539C95.2932 28.8227 92.871 24.3692 89.8167 20.348C85.8452 15.1192 80.8826 10.7238 75.2124 7.41289C69.5422 4.10194 63.2754 1.94025 56.7698 1.05124C51.7666 0.367541 46.6976 0.446843 41.7345 1.27873C39.2613 1.69328 37.813 4.19778 38.4501 6.62326C39.0873 9.04874 41.5694 10.4717 44.0505 10.1071C47.8511 9.54855 51.7191 9.52689 55.5402 10.0491C60.8642 10.7766 65.9928 12.5457 70.6331 15.2552C75.2735 17.9648 79.3347 21.5619 82.5849 25.841C84.9175 28.9121 86.7997 32.2913 88.1811 35.8758C89.083 38.2158 91.5421 39.6781 93.9676 39.0409Z" fill="currentFill"/></svg>
                <span class="sr-only" i18n>Loading...</span>
            </div>
        </div>

        <ng-container *ngIf="items.length > 0; else templateEmpty">
            <div class="px-3 sm:px-0 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mb-5" [ngClass]="{'opacity-50 pointer-events-none': loading}">
                <div *ngFor="let item of items">
                    <article class="relative bg-white p-3 rounded rounded-[1rem] border border-gray-200 shadow h-full flex flex-col">
                        <div class="flex gap-3 mb-3 items-center">
                            <div class="w-14 h-14 rounded-full border border-gray-300 bg-gray-50 flex items-center justify-center shrink-0">
                                <i class="bi bi-table text-2xl text-gray-700"></i>
                            </div>
                            <div class="min-w-0">
                                <div class="text-xl leading-6 app-font-header break-words">
                                    {{ item.title }}
                                </div>
                                <div class="text-xs text-gray-500 break-all mt-1">
                                    {{ item.name }}
                                </div>
                            </div>
                        </div>

                        <p class="text-sm text-gray-600 mb-4 min-h-10 break-words" *ngIf="item.description; else templateNoDescription">
                            {{ item.description }}
                        </p>

                        <div class="mt-auto space-y-2 text-sm">
                            <div class="flex items-center justify-between gap-3">
                                <span class="text-gray-500" i18n="@@UserDataFields">Fields</span>
                                <span class="font-medium text-gray-900">{{ getFieldsCount(item) }}</span>
                            </div>
                            <div class="flex items-center justify-between gap-3">
                                <span class="text-gray-500" i18n="@@UserDataUpdated">Updated</span>
                                <span class="text-gray-700">{{ item.date_updated | date:'short' }}</span>
                            </div>
                        </div>

                        <div class="mt-4 flex gap-2">
                            <a class="flex-grow relative inline-flex items-center justify-center p-0.5 overflow-hidden text-sm font-medium text-gray-900 rounded-lg group bg-gradient-to-br from-cyan-500 to-blue-500 group-hover:from-cyan-500 group-hover:to-blue-500 hover:text-white focus:ring-4 focus:outline-none focus:ring-cyan-200"
                               ngxTippy="Edit"
                               [tippyProps]="{placement: 'bottom'}"
                               i18n-ngxTippy="@@UserDataEdit"
                               [routerLink]="['/user-data/edit', item.id]">
                                <span class="flex-grow relative px-0 py-2.5 text-center transition-all ease-in duration-75 bg-white rounded-md group-hover:bg-opacity-0">
                                    <i class="bi bi-pencil"></i>
                                </span>
                            </a>

                            <button class="flex-grow relative inline-flex items-center justify-center p-0.5 overflow-hidden text-sm font-medium text-gray-900 rounded-lg group bg-gradient-to-br from-red-200 via-red-300 to-yellow-200 group-hover:from-red-200 group-hover:via-red-300 group-hover:to-yellow-200 focus:ring-4 focus:outline-none focus:ring-red-100"
                                    ngxTippy="Delete"
                                    [tippyProps]="{placement: 'bottom'}"
                                    i18n-ngxTippy="@@UserDataDelete"
                                    (click)="deleteItem(item)">
                                <span class="flex-grow relative px-0 py-2.5 text-center transition-all ease-in duration-75 bg-white rounded-md group-hover:bg-opacity-0">
                                    <i class="bi bi-trash3"></i>
                                </span>
                            </button>
                        </div>
                    </article>
                </div>
            </div>

            <div class="px-3 sm:px-0"
                 [ngClass]="{'opacity-50 pointer-events-none': loading}"
                 *ngIf="totalRecords > perPage">
                <app-pagination [totalRecords]="totalRecords"
                                [perPage]="perPage"
                                [first]="(currentPage - 1) * perPage"
                                (onPageChange)="onPageChange($event)"></app-pagination>
            </div>
        </ng-container>
    </div>
</main>

<app-confirm
    message="Are you sure you want to delete this data table?"
    i18n-message="@@UserDataDeleteTableConfirm"
    [(isActive)]="isDeleteAction"
    (confirmed)="deleteItemConfirmed()"></app-confirm>

<ng-template #templateNoDescription>
    <p class="text-sm text-gray-400 mb-4 min-h-10" i18n="@@UserDataNoDescription">No description.</p>
</ng-template>

<ng-template #templateNotLoggedIn>
    <div class="px-3">
        <div class="grid gap-6 mb-6 md:grid-cols-4">
            <div class="md:col-start-2 md:col-span-2">
                <app-not-authorized></app-not-authorized>
            </div>
        </div>
    </div>
</ng-template>

<ng-template #templateEmpty>
    <ng-container *ngIf="userSubject$ | async; else templateNotLoggedIn">
        <div class="px-3 sm:px-0">
            <div class="flex items-center p-4 mb-4 text-sm text-blue-800 border border-blue-300 rounded-lg bg-blue-50" role="alert" *ngIf="!loading">
                <svg class="flex-shrink-0 inline w-4 h-4 me-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z"/>
                </svg>
                <span class="sr-only" i18n>Info</span>
                <div i18n>Empty.</div>
            </div>
        </div>
    </ng-container>
</ng-template>

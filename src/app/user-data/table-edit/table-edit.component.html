<header class="bg-white shadow sticky top-0 z-40">
    <div class="mx-auto max-w-7xl py-3 px-4 sm:px-6 lg:px-8">
        <div class="block sm:flex justify-between">
            <nav aria-label="Breadcrumb" class="flex mb-2 sm:mb-0">
                <ol class="flex w-full sm:w-auto overflow-hidden rounded-lg border border-gray-300 text-gray-600">
                    <li class="flex items-center">
                        <a class="flex h-10 items-center gap-1.5 bg-gray-200 px-4 transition hover:text-gray-900"
                           [routerLink]="['/user-data']">
                            <i class="bi bi-house-door"></i>
                            <span class="ms-1.5 text-xs font-medium">Data Tables</span>
                        </a>
                    </li>
                    <li class="relative flex items-center">
                        <span class="absolute inset-y-0 -start-px h-10 w-4 bg-gray-200 [clip-path:_polygon(0_0,_0%_100%,_100%_50%)] rtl:rotate-180"></span>
                        <span class="flex h-10 items-center bg-white pe-4 ps-8 text-xs font-medium transition hover:text-gray-900">
                            <span *ngIf="data?.id" i18n>Edit</span>
                            <span *ngIf="!data?.id" i18n>Create</span>
                        </span>
                    </li>
                </ol>
            </nav>

            <div class="flex gap-2 justify-center sm:justify-start">
                <button type="button"
                        class="border border-green-500 bg-green-500 text-white rounded-md px-6 py-2 transition duration-500 ease select-none hover:bg-green-600 focus:outline-none focus:shadow-outline"
                        [disabled]="submitted"
                        (click)="saveData()">
                    <svg aria-hidden="true" class="inline w-4 h-4 mr-2 text-gray-200 animate-spin fill-gray-600" viewBox="0 0 100 101" fill="none" xmlns="http://www.w3.org/2000/svg" *ngIf="loading && submitted">
                        <path d="M100 50.5908C100 78.2051 77.6142 100.591 50 100.591C22.3858 100.591 0 78.2051 0 50.5908C0 22.9766 22.3858 0.59082 50 0.59082C77.6142 0.59082 100 22.9766 100 50.5908ZM9.08144 50.5908C9.08144 73.1895 27.4013 91.5094 50 91.5094C72.5987 91.5094 90.9186 73.1895 90.9186 50.5908C90.9186 27.9921 72.5987 9.67226 50 9.67226C27.4013 9.67226 9.08144 27.9921 9.08144 50.5908Z" fill="currentColor"/>
                        <path d="M93.9676 39.0409C96.393 38.4038 97.8624 35.9116 97.0079 33.5539C95.2932 28.8227 92.871 24.3692 89.8167 20.348C85.8452 15.1192 80.8826 10.7238 75.2124 7.41289C69.5422 4.10194 63.2754 1.94025 56.7698 1.05124C51.7666 0.367541 46.6976 0.446843 41.7345 1.27873C39.2613 1.69328 37.813 4.19778 38.4501 6.62326C39.0873 9.04874 41.5694 10.4717 44.0505 10.1071C47.8511 9.54855 51.7191 9.52689 55.5402 10.0491C60.8642 10.7766 65.9928 12.5457 70.6331 15.2552C75.2735 17.9648 79.3347 21.5619 82.5849 25.841C84.9175 28.9121 86.7997 32.2913 88.1811 35.8758C89.083 38.2158 91.5421 39.6781 93.9676 39.0409Z" fill="currentFill"/>
                    </svg>
                    <i class="bi bi-check me-1"></i>
                    <span i18n>Save</span>
                </button>
            </div>
        </div>
    </div>
</header>

<main>
    <div class="mx-auto max-w-7xl py-6 px-4 sm:px-6 lg:px-8">
        <h2 class="text-xl font-bold mb-4">
            <span *ngIf="data?.id">Edit Table</span>
            <span *ngIf="!data?.id">Create Table</span>
        </h2>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-5 mb-6">
            <section class="lg:col-span-2">
                <div class="bg-white border border-gray-200 rounded-lg shadow p-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block mb-2 text-sm font-medium text-gray-900" for="fieldTitle">Title</label>
                            <input type="text"
                                   class="bg-gray-50 border border-gray-300 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 shadow-inner"
                                   id="fieldTitle"
                                   [ngClass]="{'bg-red-50 border border-red-500 text-red-900 placeholder-red-700': errors['title']}"
                                   [(ngModel)]="data.title"
                                   (ngModelChange)="deleteErrorMessages('title')">
                            <div *ngIf="errors['title']">
                                <div class="mt-2 text-sm text-red-600" *ngFor="let errorMessage of errors['title']">{{ errorMessage }}</div>
                            </div>
                        </div>
                        <div>
                            <label class="block mb-2 text-sm font-medium text-gray-900" for="fieldName">Technical name</label>
                            <input type="text"
                                   class="bg-gray-50 border border-gray-300 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 shadow-inner disabled:bg-gray-100 disabled:text-gray-500"
                                   id="fieldName"
                                   [disabled]="!isNewItem"
                                   [ngClass]="{'bg-red-50 border border-red-500 text-red-900 placeholder-red-700': errors['name']}"
                                   [(ngModel)]="data.name"
                                   (ngModelChange)="deleteErrorMessages('name')">
                            <div *ngIf="errors['name']">
                                <div class="mt-2 text-sm text-red-600" *ngFor="let errorMessage of errors['name']">{{ errorMessage }}</div>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block mb-2 text-sm font-medium text-gray-900" for="fieldDescription">Description</label>
                        <textarea class="block min-h-[70px] p-2.5 w-full text-sm bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 shadow-inner"
                                  id="fieldDescription"
                                  rows="4"
                                  [(ngModel)]="data.description"></textarea>
                    </div>
                </div>
            </section>

            <aside>
                <div class="bg-white border border-gray-200 rounded-lg shadow p-4 text-sm space-y-3">
                    <div class="flex items-center justify-between gap-3" *ngIf="data.db_table_name">
                        <span class="text-gray-500">DB table</span>
                        <span class="font-mono text-xs text-gray-700 text-right break-all">{{ data.db_table_name }}</span>
                    </div>
                    <div class="flex items-start justify-between gap-3" *ngIf="data.access_key">
                        <span class="text-gray-500 shrink-0">Access key</span>
                        <span class="font-mono text-xs text-gray-700 text-right break-all">{{ data.access_key }}</span>
                    </div>
                    <div class="flex items-center justify-between gap-3" *ngIf="data.date_updated">
                        <span class="text-gray-500">Updated</span>
                        <span class="text-gray-700">{{ data.date_updated | date:'short' }}</span>
                    </div>
                </div>
            </aside>
        </div>

        <section class="bg-white border border-gray-200 rounded-lg shadow p-4">
            <div class="flex items-center justify-between gap-3 mb-4">
                <h3 class="text-lg font-semibold">Fields</h3>
            </div>

            <div class="space-y-3">
                <div class="grid grid-cols-1 lg:grid-cols-[1fr_1fr_170px_110px_120px_44px] gap-3 items-end border border-gray-100 rounded-lg p-3"
                     *ngFor="let field of data.fields; index as index">
                    <div>
                        <label class="block mb-2 text-sm font-medium text-gray-900">Name</label>
                        <input type="text"
                               class="bg-gray-50 border border-gray-300 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 shadow-inner disabled:bg-gray-100 disabled:text-gray-500"
                               [disabled]="!!field.id"
                               [(ngModel)]="field.name">
                    </div>
                    <div>
                        <label class="block mb-2 text-sm font-medium text-gray-900">Column</label>
                        <input type="text"
                               class="bg-gray-50 border border-gray-300 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 shadow-inner disabled:bg-gray-100 disabled:text-gray-500"
                               [disabled]="!!field.id"
                               [(ngModel)]="field.column_name">
                    </div>
                    <div>
                        <label class="block mb-2 text-sm font-medium text-gray-900">Type</label>
                        <select class="bg-gray-50 border border-gray-300 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 shadow-inner disabled:bg-gray-100 disabled:text-gray-500"
                                [disabled]="!!field.id"
                                [(ngModel)]="field.field_type">
                            <option *ngFor="let type of fieldTypes" [value]="type.name">{{ type.title }}</option>
                        </select>
                    </div>
                    <div>
                        <label class="block mb-2 text-sm font-medium text-gray-900">Required</label>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" class="sr-only peer" [disabled]="!!field.id" [(ngModel)]="field.required">
                            <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-focus:ring-4 peer-focus:ring-indigo-200 focus:ring-opacity-50 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-blue-600"></div>
                        </label>
                    </div>
                    <div>
                        <label class="block mb-2 text-sm font-medium text-gray-900">Max length</label>
                        <input type="number"
                               class="bg-gray-50 border border-gray-300 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 shadow-inner disabled:bg-gray-100 disabled:text-gray-500"
                               min="1"
                               [disabled]="!!field.id || !['string', 'file'].includes(field.field_type)"
                               [(ngModel)]="field.max_length">
                    </div>
                    <div>
                        <button type="button"
                                class="w-10 h-10 inline-flex items-center justify-center rounded-lg border border-red-200 text-red-700 hover:bg-red-50 disabled:opacity-50"
                                (click)="deleteField(field)">
                            <i class="bi bi-trash3"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="mt-4 text-center">
                <button type="button"
                        class="text-gray-900 bg-white border border-gray-300 focus:outline-none hover:bg-gray-100 focus:ring-4 focus:ring-gray-100 font-medium rounded-lg text-sm px-4 py-2 shadow-sm"
                        (click)="addField()">
                    <i class="bi bi-plus-lg me-1"></i>
                    <span>Add Field</span>
                </button>
            </div>
        </section>
    </div>
</main>

<app-confirm
    message="Are you sure you want to delete this field?"
    [(isActive)]="isDeleteFieldAction"
    (confirmed)="deleteFieldConfirmed()"></app-confirm>

<app-alert [(message)]="message" [type]="messageType"></app-alert>

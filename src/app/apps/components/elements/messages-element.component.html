<div class="w-full max-w-[600px] mx-auto">
    <label class="block mb-2 text-sm font-medium text-gray-900" *ngIf="label">
        {{ label }}
    </label>
    <div class="flex flex-col border border-gray-300 rounded-lg overflow-hidden bg-gray-50 shadow-inner">

        <div class="flex flex-col gap-2 p-3 overflow-y-auto"
             [style.min-height.px]="200"
             [style.max-height.px]="maxHeight"
             #messagesContainer>

            <div class="text-center text-gray-400 text-sm py-8" *ngIf="messages.length === 0">
                <i class="bi bi-chat-dots text-3xl block mb-2"></i>
                <span i18n>No messages yet</span>
            </div>

            <div *ngFor="let msg of messages"
                 class="flex"
                 [ngClass]="{'justify-end': msg.direction === 'outgoing', 'justify-start': msg.direction === 'incoming'}">
                <div class="max-w-[80%] px-3 py-2 rounded-2xl text-sm whitespace-pre-line break-words"
                     [ngClass]="{
                         'bg-blue-500 text-white rounded-br-sm': msg.direction === 'outgoing',
                         'bg-white border border-gray-200 text-gray-800 rounded-bl-sm shadow-sm': msg.direction === 'incoming'
                     }">
                    <div>{{ msg.text }}</div>
                    <div class="text-[10px] mt-1"
                         [ngClass]="{'text-blue-200': msg.direction === 'outgoing', 'text-gray-400': msg.direction === 'incoming'}">
                        {{ msg.timestamp | date:'HH:mm' }}
                    </div>
                </div>
            </div>

        </div>

        <div class="flex gap-2 p-2 border-t border-gray-200 bg-white" *ngIf="!editorMode">
            <input type="text"
                   class="flex-grow bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-full focus:ring-blue-500 focus:border-blue-500 px-4 py-2"
                   [placeholder]="placeholder"
                   [(ngModel)]="inputText"
                   (keyup.enter)="sendMessage()">
            <button type="button"
                    class="text-white bg-blue-500 hover:bg-blue-600 focus:ring-4 focus:ring-blue-300 rounded-full w-10 h-10 flex items-center justify-center transition-colors"
                    [ngClass]="{'opacity-50 cursor-not-allowed': !inputText?.trim()}"
                    (click)="sendMessage()">
                <i class="bi bi-send-fill"></i>
            </button>
        </div>

        <div class="flex gap-2 p-3 text-center text-gray-400" *ngIf="editorMode">
            <div class="flex-grow bg-gray-200 rounded-full px-4 py-2 text-sm text-left">
                {{ placeholder }}
            </div>
            <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white">
                <i class="bi bi-send-fill"></i>
            </div>
        </div>

    </div>
</div>

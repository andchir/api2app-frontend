<div class="w-full max-w-[600px] mx-auto">
    <label class="block mb-2 text-sm font-medium text-gray-900"
           *ngIf="label">
        {{ label }}
    </label>

    <ng-container *ngIf="!compactView; else compactDateTemplate">
        <ng-container *ngTemplateOutlet="calendarTemplate"></ng-container>
    </ng-container>

    <ng-template #compactDateTemplate>
        <div class="relative">
            <button type="button"
                    class="w-full flex items-center justify-between gap-3 p-2.5 bg-gray-50 text-sm text-gray-900 rounded-lg border border-gray-300 shadow-inner"
                    [ngClass]="{'border-red-500 ring-1 ring-red-200': isBusy}"
                    (click)="toggleDropdown($event)">
                <span class="truncate" [ngClass]="{'text-gray-500': !value}">{{ displayValue }}</span>
                <i class="bi bi-calendar3 text-gray-600"></i>
            </button>
            <div class="absolute z-20 mt-2 w-full min-w-[320px] bg-white"
                 *ngIf="isOpened"
                 (click)="keepDropdownOpened($event)">
                <ng-container *ngTemplateOutlet="calendarTemplate"></ng-container>
            </div>
        </div>
    </ng-template>

    <ng-template #calendarTemplate>
        <div class="rounded-lg border border-slate-300 bg-white p-3 shadow-md"
             [ngClass]="{'border-red-500 ring-1 ring-red-200': isBusy}">
            <div class="flex items-center justify-between gap-2">
                <button type="button"
                        class="flex h-9 w-9 items-center justify-center rounded border border-gray-200 text-gray-700 hover:bg-gray-50"
                        (click)="previousMonth()">
                    <i class="bi bi-chevron-left"></i>
                </button>
                <div class="text-sm font-semibold text-gray-900 first-letter-uppercase">
                    {{ monthLabel }}
                </div>
                <button type="button"
                        class="flex h-9 w-9 items-center justify-center rounded border border-gray-200 text-gray-700 hover:bg-gray-50"
                        (click)="nextMonth()">
                    <i class="bi bi-chevron-right"></i>
                </button>
            </div>

            <div class="mt-3 grid grid-cols-7 gap-1 text-center text-xs font-medium text-gray-500">
                <div class="h-7 leading-7" *ngFor="let weekDay of weekDays">{{ weekDay }}</div>
            </div>

            <div class="grid grid-cols-7 gap-1">
                <button type="button"
                        class="relative h-10 rounded text-sm transition"
                        [ngClass]="{
                            'text-gray-900 hover:bg-blue-50': day.currentMonth && !day.busy && !day.selected && !day.inRange,
                            'text-gray-400 hover:bg-gray-50': !day.currentMonth && !day.busy && !day.selected && !day.inRange,
                            'bg-blue-600 text-white hover:bg-blue-700': (day.selected && !rangeMode) || day.rangeStart || day.rangeEnd,
                            'bg-blue-100 text-blue-800 hover:bg-blue-200': day.inRange,
                            'bg-red-50 text-red-300 cursor-not-allowed line-through': day.busy,
                            'ring-1 ring-blue-300': day.today && !day.selected
                        }"
                        [disabled]="day.busy"
                        (click)="selectDate(day)"
                        *ngFor="let day of calendarDays">
                    {{ day.dayNumber }}
                    <span class="absolute bottom-1 left-1/2 h-1 w-1 -translate-x-1/2 rounded-full bg-current"
                          *ngIf="day.today"></span>
                </button>
            </div>

            <div class="mt-3 grid grid-cols-2 gap-2 text-xs text-gray-600" *ngIf="rangeMode">
                <div class="rounded bg-gray-50 px-2 py-1">
                    <span i18n>From</span>: <span class="font-medium text-gray-900">{{ rangeStartDate || '-' }}</span>
                </div>
                <div class="rounded bg-gray-50 px-2 py-1">
                    <span i18n>To</span>: <span class="font-medium text-gray-900">{{ rangeEndDate || '-' }}</span>
                </div>
            </div>

            <div class="mt-3 flex items-center justify-between gap-3" *ngIf="includeTime && !rangeMode">
                <div class="flex items-center gap-2">
                    <select class="h-9 rounded border border-gray-300 bg-gray-50 px-2 text-sm text-gray-900"
                            [(ngModel)]="selectedHour"
                            (ngModelChange)="onTimeChange()">
                        <option [value]="hour" *ngFor="let hour of hours">{{ hour }}</option>
                    </select>
                    <span class="text-gray-500">:</span>
                    <select class="h-9 rounded border border-gray-300 bg-gray-50 px-2 text-sm text-gray-900"
                            [(ngModel)]="selectedMinute"
                            (ngModelChange)="onTimeChange()">
                        <option [value]="minute" *ngFor="let minute of minutes">{{ minute }}</option>
                    </select>
                </div>
                <button type="button"
                        class="text-sm text-gray-500 hover:text-gray-900"
                        (click)="clearValue($event)"
                        *ngIf="value"
                        i18n>
                    Clear
                </button>
            </div>

            <div class="mt-3 space-y-2" *ngIf="includeTime && rangeMode">
                <div class="flex items-center justify-between gap-3">
                    <span class="text-xs font-medium text-gray-600" i18n>From</span>
                    <div class="flex items-center gap-2">
                        <select class="h-9 rounded border border-gray-300 bg-gray-50 px-2 text-sm text-gray-900"
                                [(ngModel)]="rangeStartHour"
                                (ngModelChange)="onTimeChange()">
                            <option [value]="hour" *ngFor="let hour of hours">{{ hour }}</option>
                        </select>
                        <span class="text-gray-500">:</span>
                        <select class="h-9 rounded border border-gray-300 bg-gray-50 px-2 text-sm text-gray-900"
                                [(ngModel)]="rangeStartMinute"
                                (ngModelChange)="onTimeChange()">
                            <option [value]="minute" *ngFor="let minute of minutes">{{ minute }}</option>
                        </select>
                    </div>
                </div>
                <div class="flex items-center justify-between gap-3">
                    <span class="text-xs font-medium text-gray-600" i18n>To</span>
                    <div class="flex items-center gap-2">
                        <select class="h-9 rounded border border-gray-300 bg-gray-50 px-2 text-sm text-gray-900"
                                [(ngModel)]="rangeEndHour"
                                (ngModelChange)="onTimeChange()">
                            <option [value]="hour" *ngFor="let hour of hours">{{ hour }}</option>
                        </select>
                        <span class="text-gray-500">:</span>
                        <select class="h-9 rounded border border-gray-300 bg-gray-50 px-2 text-sm text-gray-900"
                                [(ngModel)]="rangeEndMinute"
                                (ngModelChange)="onTimeChange()">
                            <option [value]="minute" *ngFor="let minute of minutes">{{ minute }}</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="mt-2 flex justify-end" *ngIf="(!includeTime || rangeMode) && value">
                <button type="button"
                        class="text-sm text-gray-500 hover:text-gray-900"
                        (click)="clearValue($event)"
                        i18n>
                    Clear
                </button>
            </div>

            <div class="mt-2 text-xs text-red-600" *ngIf="isBusy" i18n>
                This date is already occupied.
            </div>
        </div>
    </ng-template>
</div>

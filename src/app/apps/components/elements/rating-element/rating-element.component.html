<div class="flex items-center justify-center">
    <button type="button"
            class="inline-flex h-10 w-10 items-center justify-center rounded text-2xl text-amber-400 transition-colors hover:text-amber-500 focus:outline-none focus:ring-2 focus:ring-amber-300 disabled:cursor-not-allowed"
            [attr.aria-label]="star + ' / 5'"
            [disabled]="disabled || editorMode"
            (mouseenter)="setHoverValue(star)"
            (mouseleave)="clearHoverValue()"
            (focus)="setHoverValue(star)"
            (blur)="clearHoverValue()"
            (click)="selectValue(star)"
            *ngFor="let star of stars">
        <i class="bi" [ngClass]="isFilled(star) ? 'bi-star-fill' : 'bi-star'"></i>
    </button>
</div>
